services:
  postgres:
    image: postgres:16
    container_name: epios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epios}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epios_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-epios_dev}
    ports:
      - "5432:5432"
    volumes:
      - epios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epios} -d ${POSTGRES_DB:-epios_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    container_name: epios-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-epios}:${POSTGRES_PASSWORD:-epios_dev_password}@postgres:5432/${POSTGRES_DB:-epios_dev}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  demo-shell:
    build:
      context: .
      target: demo-shell
    container_name: epios-demo-shell
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api

volumes:
  epios_postgres_data:
