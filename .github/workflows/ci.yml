name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Security Audit & Scans
      run: pnpm test:security

    - name: Verify
      run: pnpm verify

    - name: QA ADR Review
      run: pnpm qa:adr-review

    - name: Build
      run: pnpm build

  containerize:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build API image
      run: docker build --target api -t epios-api:latest .
    - name: Build Demo Shell image
      run: docker build --target demo-shell -t epios-demo-shell:latest .

  deploy:
    needs: containerize
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy Placeholder
      run: echo "Deploying to production environment..."
