<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Studio — Project Explorer (EPIOS)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        aside {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-color);
        }

        .nav-group {
            margin-bottom: 24px;
        }

        .nav-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        /* ── Main Content ── */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ── Cards & UI Elements ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── Mermaid Customization ── */
        .mermaid-container {
            background: white;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            height: 600px;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .mermaid {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .graph-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        /* ── Markdown Tables ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        code {
            font-family: 'Fira Code', monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre code {
            display: block;
            padding: 16px;
            overflow-x: auto;
            background: #1e293b;
            border-radius: 8px;
            margin: 12px 0;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* ── Animation ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .view-section {
            animation: fadeIn 0.4s ease-out;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.3);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        <div class="nav-item" onclick="showSection('api')">🔌 API Реестр</div>
        <div class="nav-item" onclick="showSection('env')">🔑 Окружение</div>

</aside>

                    <p>Не удалось загрузить <code>PROJECT_MAP.md</code>. Убедитесь, что скрипт генерации был запущен.</p>
                </div>
            `;
            document.getElementById('loading').style.display = 'none';
        }
    }

    function parseMarkdown(text) {
        const lines = text.split('\n');
        
        const updateLine = lines.find(l => l.startsWith('> Автоматически сгенерировано:'));
        if (updateLine) {
            const match = updateLine.match(/`(.+)`/);
            projectData.updated = match ? match[1] : 'Unknown';
            document.getElementById('update-time').innerText = 'Обновлено: ' + projectData.updated;
        }

        const mermaidBlocks = [];
        let pos = 0;
        while ((pos = text.indexOf('```mermaid', pos)) !== -1) {
            const end = text.indexOf('```', pos + 10);
            if (end !== -1) {
                mermaidBlocks.push(text.substring(pos + 10, end).trim());
                pos = end + 3;
            } else break;
        }
        projectData.mermaidHigh = mermaidBlocks[0] || '';
        projectData.mermaidDetailed = mermaidBlocks[1] || '';
        projectData.mermaidUI = mermaidBlocks[2] || '';
        projectData.mermaid = projectData.mermaidHigh;

        const sections = text.split('\n## ');
        sections.forEach(sec => {
            if (sec.startsWith('Компонент:')) {
                const titleMatch = sec.match(/`(.+)`/);
                if (titleMatch) {
                    const title = titleMatch[1];
                    const tableStart = sec.indexOf('|');
                    const tableEnd = sec.indexOf('\n\n', tableStart);
                    projectData.components[title] = sec.substring(tableStart, tableEnd === -1 ? undefined : tableEnd);
                }
            }
            if (sec.startsWith('API Реестр')) {
                const tableStart = sec.indexOf('|');
                projectData.apiTable = sec.substring(tableStart);
            }
            if (sec.startsWith('Переменные окружения')) {
                const tableStart = sec.indexOf('|');
                projectData.envTable = sec.substring(tableStart);
            }
            if (sec.startsWith('📊 Telemetry')) {
                const tableStart = sec.indexOf('|');
                projectData.telemetryTable = sec.substring(tableStart);
                
                const rows = projectData.telemetryTable.split('\n');
                projectData.stats = {
                    tokens: (rows.find(r => r.includes('Project Weight')) || '').match(/`~(.+) tokens`/)?.[1] || '0',
                    pressure: (rows.find(r => r.includes('Context Pressure')) || '').match(/`(.+)%`/)?.[1] || '0',
                    efficiency: (rows.find(r => r.includes('Map Efficiency')) || '').match(/`~(.+)%`/)?.[1] || '0'
                };
            }
        });
    }

    function showSection(sectionId) {
        const area = document.getElementById('content-area');
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            const label = item.innerText.toLowerCase();
            if (label.includes('телеметрия') && sectionId === 'telemetry') item.classList.add('active');
            else if (label.includes('api') && sectionId === 'api') item.classList.add('active');
            else if (label.includes('окружение') && sectionId === 'env') item.classList.add('active');
            else if (label.includes('пакеты') && sectionId === 'inventory') item.classList.add('active');
            else if (label.includes('архитектура') && sectionId === 'architecture') item.classList.add('active');
            else if (label.includes('ui архитектура') && sectionId === 'ui-architecture') item.classList.add('active');
        });

        let html = '';

        switch(sectionId) {
            case 'architecture':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>Архитектура EPIOS</h1>
                            <p class="meta">Визуализация структуры Epistemic OS</p>
                        </header>
                        <div class="card">
                            <div class="card-title">
                                🗺️ Системный граф
                                <div style="margin-left: auto; display: flex; gap: 8px;">
                                    <button class="btn ${projectData.mermaid === projectData.mermaidHigh ? 'active' : ''}" onclick="switchMermaid('high')">Пакеты</button>
                                    <button class="btn ${projectData.mermaid === projectData.mermaidDetailed ? 'active' : ''}" onclick="switchMermaid('detailed')">Файлы</button>
                                </div>
                            </div>
                            <div class="mermaid-container">
                                <div class="graph-controls">
                                    <button class="btn" onclick="resetZoom()">Сброс</button>
                                </div>
                                <div class="mermaid" id="mermaid-graph">
                                    ${projectData.mermaid}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                break;
            case 'ui-architecture':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>🎨 UI Архитектура</h1>
                            <p class="meta">Концептуальная структура компонентов demo-shell</p>
                        </header>
                        <div class="card">
                            <div class="card-title">🧩 Схема компонентов</div>
                            <div class="mermaid-container">
                                <div class="graph-controls">
                                    <button class="btn" onclick="resetZoom()">Сброс</button>
                                </div>
                                <div class="mermaid" id="mermaid-graph">
                                    ${projectData.mermaidUI}
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-title">🚀 UI Roadmap</div>
                            <p>Подробная документация и план развития интерфейсов доступны в разделе:</p>
                            <div style="margin-top: 15px;">
                                <a href="../docs/05_ui_roadmap/00_ROADMAP_INDEX.md" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">📂 docs/05_ui_roadmap/00_ROADMAP_INDEX.md</a>
                            </div>
                        </div>
                    </div>
                `;
                break;
            case 'inventory':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>Состав проекта</h1>
                            <p class="meta">Список приложений и пакетов монорепозитория</p>
                        </header>
                        ${Object.entries(projectData.components).map(([name, table]) => `
                            <div class="card">
                                <div class="card-title">📦 Группа: <code>${name}</code></div>
                                <div class="markdown-body">${marked.parse(table)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                break;
            case 'api':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>API Реестр</h1>
                            <p class="meta">Обнаруженные эндпоинты в пакетах</p>
                        </header>
                        <div class="card">
                            <div class="markdown-body">${marked.parse(projectData.apiTable || 'Нет данных')}</div>
                        </div>
                    </div>
                `;
                break;
            case 'env':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>Окружение</h1>
                            <p class="meta">Использование переменных среды</p>
                        </header>
                        <div class="card">
                            <div class="markdown-body">${marked.parse(projectData.envTable || 'Нет данных')}</div>
                        </div>
                    </div>
                `;
                break;
            case 'telemetry':
                const pressure = parseFloat(projectData.stats.pressure);
                const color = pressure > 80 ? '#ef4444' : (pressure > 50 ? '#f59e0b' : '#10b981');
                html = `
                    <div class="view-section">
                        <header>
                            <h1>📊 Контекстная телеметрия</h1>
                            <p class="meta">Оценка нагрузки на окно ИИ-агента</p>
                        </header>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                            <div class="card" style="margin-bottom: 0">
                                <div class="card-title">Вес проекта</div>
                                <div style="font-size: 2rem; font-weight: 800; color: var(--accent-color)">${projectData.stats.tokens}</div>
                                <p class="meta">~ токенов (estimate)</p>
                            </div>
                            <div class="card" style="margin-bottom: 0">
                                <div class="card-title">Context Pressure</div>
                                <div style="font-size: 2rem; font-weight: 800; color: ${color}">${projectData.stats.pressure}%</div>
                                <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden">
                                    <div style="width: ${projectData.stats.pressure}%; height: 100%; background: ${color}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-title">📝 Подробная статистика</div>
                            <div class="markdown-body">${marked.parse(projectData.telemetryTable || 'Нет данных')}</div>
                        </div>
                    </div>
                `;
                break;
        }

        area.innerHTML = html;
        
        if (sectionId === 'architecture' || sectionId === 'ui-architecture') {
            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            setTimeout(initPanZoom, 500);
        }
    }

    let panZoomInstance = null;

    function initPanZoom() {
        const svg = document.querySelector('.mermaid svg');
        if (!svg) return;
        
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '100%');
        
        if (panZoomInstance) panZoomInstance.destroy();
        
        panZoomInstance = svgPanZoom(svg, {
            zoomEnabled: true,
            controlIconsEnabled: true,
            fit: true,
            center: true,
            minZoom: 0.1,
            maxZoom: 10
        });
    }

    function resetZoom() {
        if (panZoomInstance) panZoomInstance.reset();
    }

    function switchMermaid(type) {
        projectData.mermaid = (type === 'high') ? projectData.mermaidHigh : projectData.mermaidDetailed;
        showSection('architecture');
    }

    mermaid.initialize({ 
        startOnLoad: false,
        theme: 'neutral',
        securityLevel: 'loose',
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
    });
    
    loadMap();
</script>

</body>
</html>
